name: Release StorageScanner

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode to run"
        required: true
        default: publish
        type: choice
        options:
          - publish
          - upload

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_MODE: ${{ github.event_name == 'release' && 'upload' || inputs.mode }}
      APPCAST_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/appcast.xml
      DEVELOPER_ID_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
      NOTARYTOOL_PROFILE: ${{ secrets.NOTARYTOOL_PROFILE }}
      NOTARYTOOL_API_KEY_ID: ${{ secrets.NOTARYTOOL_API_KEY_ID }}
      NOTARYTOOL_API_ISSUER_ID: ${{ secrets.NOTARYTOOL_API_ISSUER_ID }}
      NOTARYTOOL_API_KEY_P8: ${{ secrets.NOTARYTOOL_API_KEY_P8 }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY || secrets.SPARKLE_PRIVATE_KEY_FILE }}
      SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
      DEVELOPER_ID_CERTIFICATE_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
      DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set release base dir
        shell: bash
        run: |
          set -euo pipefail
          echo "RELEASE_BASE_DIR=$RUNNER_TEMP/storage-scanner-release" >> "$GITHUB_ENV"

      - name: Select Xcode 26.1.1 (if present) or fallback to default
        shell: bash
        run: |
          set -euo pipefail
          for candidate in /Applications/Xcode_26.1.1.app /Applications/Xcode_26.1.app /Applications/Xcode.app; do
            if [[ -d "$candidate" ]]; then
              sudo xcode-select -s "${candidate}/Contents/Developer"
              echo "DEVELOPER_DIR=${candidate}/Contents/Developer" >> "$GITHUB_ENV"
              break
            fi
          done
          /usr/bin/xcodebuild -version

      - name: Runner info
        shell: bash
        run: |
          set -euo pipefail
          uname -a
          uname -m
          swift --version

      - name: Materialize notarization key
        if: env.NOTARYTOOL_PROFILE == ''
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${NOTARYTOOL_API_KEY_P8:-}" ]]; then
            echo "ERROR: Set NOTARYTOOL_PROFILE or NOTARYTOOL_API_KEY_P8 in GitHub secrets." >&2
            exit 1
          fi

          if [[ -z "${NOTARYTOOL_API_KEY_ID:-}" || -z "${NOTARYTOOL_API_ISSUER_ID:-}" ]]; then
            echo "ERROR: Set NOTARYTOOL_API_KEY_ID and NOTARYTOOL_API_ISSUER_ID when using NOTARYTOOL_API_KEY_P8." >&2
            exit 1
          fi

          key_file="$RUNNER_TEMP/AuthKey.p8"
          umask 077
          printf '%s' "$NOTARYTOOL_API_KEY_P8" > "$key_file"
          echo "NOTARYTOOL_API_KEY_FILE=$key_file" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${DEVELOPER_ID_CERTIFICATE_P12_BASE64:-}" ]]; then
            echo "ERROR: Missing DEVELOPER_ID_CERTIFICATE_P12_BASE64 secret." >&2
            exit 1
          fi

          if [[ -z "${DEVELOPER_ID_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "ERROR: Missing DEVELOPER_ID_CERTIFICATE_PASSWORD secret." >&2
            exit 1
          fi

          cert_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/storage-scanner-signing.keychain-db"
          keychain_password="$(uuidgen)"

          printf '%s' "$DEVELOPER_ID_CERTIFICATE_P12_BASE64" | base64 --decode > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" \
            -k "$keychain_path" \
            -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | sed 's/[ "]//g')
          security default-keychain -d user -s "$keychain_path"
          security find-identity -p codesigning -v "$keychain_path"

      - name: Verify release secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for var in DEVELOPER_ID_IDENTITY SPARKLE_PRIVATE_KEY SPARKLE_PUBLIC_ED_KEY; do
            if [[ -z "${!var:-}" ]]; then
              echo "ERROR: Missing $var secret." >&2
              missing=1
            fi
          done
          if [[ -z "${NOTARYTOOL_PROFILE:-}" && -z "${NOTARYTOOL_API_KEY_FILE:-}" ]]; then
            echo "ERROR: Missing notarization secrets. Set NOTARYTOOL_PROFILE or NOTARYTOOL_API_KEY_P8/ID/ISSUER_ID." >&2
            missing=1
          fi
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Publish release
        shell: bash
        run: |
          set -euo pipefail
          ./Scripts/release.sh "$RELEASE_MODE"

      - name: Commit appcast update
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- appcast.xml; then
            echo "No appcast changes to commit."
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add appcast.xml
          git commit -m "Update appcast [skip ci]"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
