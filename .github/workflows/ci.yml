name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - appcast.xml
  pull_request:
    paths-ignore:
      - appcast.xml
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-storage-scanner:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      RELEASE_BASE_DIR: ${{ github.workspace }}/.release-ci/storage-scanner-release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Select Xcode 26.1.1 (if present) or fallback to default
        shell: bash
        run: |
          set -euo pipefail
          for candidate in /Applications/Xcode_26.1.1.app /Applications/Xcode_26.1.app /Applications/Xcode.app; do
            if [[ -d "$candidate" ]]; then
              sudo xcode-select -s "${candidate}/Contents/Developer"
              echo "DEVELOPER_DIR=${candidate}/Contents/Developer" >> "$GITHUB_ENV"
              break
            fi
          done
          /usr/bin/xcodebuild -version

      - name: Swift toolchain version
        shell: bash
        run: |
          set -euo pipefail
          swift --version

      - name: Test release helpers
        shell: bash
        run: |
          set -euo pipefail
          bash Scripts/test_release_common.sh
          bash Scripts/test_release_notes.sh
          bash Scripts/test_release_appcast_notes.sh
          bash Scripts/test_release_signing.sh
          bash Scripts/test_release_notarize.sh
          bash Scripts/test_release_publish.sh
          bash Scripts/test_release_upload.sh
          bash Scripts/test_release_doctor.sh

      - name: Build StorageScanner release smoke
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_SKIP_SIGNING=1 \
          RELEASE_SKIP_NOTARIZATION=1 \
          ./Scripts/release.sh local

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: storage-scanner-release
          path: ${{ github.workspace }}/.release-ci/storage-scanner-release/artifacts/*
          if-no-files-found: error
